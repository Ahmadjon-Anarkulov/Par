bot:
  token: ${BOT_TOKEN:}
  username: ${BOT_USERNAME:}
  mode: ${BOT_MODE:long_polling}   # long_polling | webhook
  webhook:
    enabled: ${BOT_WEBHOOK_ENABLED:false}
    public-url: ${BOT_WEBHOOK_PUBLIC_URL:}
    path: ${BOT_WEBHOOK_PATH:/telegram/webhook}
    secret-token: ${BOT_WEBHOOK_SECRET_TOKEN:}

admin:
  # If there are NO admins in DB yet, these IDs will be promoted to ADMIN on startup.
  # Example:
  # initial-ids:
  #   - 123456789
  initial-ids: []

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Parlament}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true