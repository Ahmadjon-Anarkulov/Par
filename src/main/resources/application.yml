bot:
  token: ${BOT_TOKEN:}
  username: ${BOT_USERNAME:}
  mode: webhook                    # ← изменил с long_polling на webhook
  webhook:
    enabled: true
    public-url: "https://par-t8r6.onrender.com/"   # ← ОБЯЗАТЕЛЬНО поменяй на свой актуальный URL
    path: "/telegram/webhook"
    secret-token: ""

admin:
  # If there are NO admins in DB yet, these IDs will be promoted to ADMIN on startup.
  # Example:
  # initial-ids:
  #   - 123456789
  initial-ids: [1004193078]

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/Parlament}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true