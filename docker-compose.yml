services:
  postgres:
    image: postgres:16
    container_name: parlament-postgres
    environment:
      POSTGRES_DB: parlament
      POSTGRES_USER: parlament
      POSTGRES_PASSWORD: parlament
    ports:
      - "5432:5432"
    volumes:
      - parlament_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    container_name: parlament-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  parlament_pgdata:

